name: Streak Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download streak SVG
        run: |
          curl -s -o streak.svg \
            "https://streak-stats.demolab.com/?user=yelubin377-jpg&theme=tokyonight&hide_border=true"

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add streak.svg
          git diff --staged --quiet || git commit -m "Update streak"
          git push
